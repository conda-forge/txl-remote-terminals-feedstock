{% set python_min = "3.10" %}
{% set name = "txl-remote-terminals" %}
{% set version = "0.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/txl_remote_terminals-{{ version }}.tar.gz
  sha256: 207e3d98ea52ee9eec6399c8b84be3b908d08c194e61dc5fdeee57306ef45a6f

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - txl >=0.2.18,<0.3.0
    - httpx >=0.23.1
    - httpx-ws >=0.4.2

test:
  # `pip check` was disabled, see: https://github.com/conda-forge/staged-recipes/pull/26869
  #
  # requires:
  #   - pip
  # commands:
  #   - pip check
  requires:
    - python {{ python_min }}
  imports:
    - txl_remote_terminals

about:
  home: https://github.com/davidbrochart/jpterm/blob/main/plugins/remote_terminals
  summary: TXL plugin for remote terminals
  dev_url: https://github.com/davidbrochart/jpterm/blob/main/plugins/remote_terminals
  license_file: LICENSE.txt
  license: MIT
  license_family: MIT

extra:
  recipe-maintainers:
    - davidbrochart
